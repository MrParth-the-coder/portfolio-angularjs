<!DOCTYPE html>
<html ng-app="portfolioApp">

<head>
    <title>Parth Gondaliya Portfolio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.js"></script>
    <!-- Angular Animate for View Transitions -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-animate.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <h2 class="logo">Parth Portfolio</h2>
        <div class="menu">
            <a href="#!/">Home</a>
            <a href="#!/about">About</a>
            <a href="#!/skills">Skills</a>
            <a href="#!/projects">Projects</a>
            <a href="#!/resume">Resume & Links</a>
            <a href="#!/contact">Contact</a>
        </div>
    </nav>

    <div class="view-container">
        <div ng-view class="view-animate"></div>
    </div>

    <script src="app.js"></script>
    
    <!-- Smooth Scrolling: avoid overriding AngularJS route navigation -->
    <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        const href = anchor.getAttribute("href");
        if (href.startsWith("#!")) return; // AngularJS route links

        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute("href"));
            if (target) {
                target.scrollIntoView({
                    behavior: "smooth"
                });
            }
        });
    });
    </script>
</body>
</html>
