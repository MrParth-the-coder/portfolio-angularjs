<div class="container" ng-controller="contactController">

<h1>Contact Me</h1>

<div class="contact-grid">
    <!-- Contact Information -->
    <div class="contact-card">
        <h2>Get In Touch</h2>
        <div class="contact-info">
            <div class="contact-item">
                <div class="contact-icon">📍</div>
                <div class="contact-details">
                    <h3>Address</h3>
                    <p>{{contactInfo.address}}</p>
                </div>
            </div>

            <div class="contact-item">
                <div class="contact-icon">📧</div>
                <div class="contact-details">
                    <h3>Email</h3>
                    <p><a href="mailto:{{contactInfo.email}}">{{contactInfo.email}}</a></p>
                </div>
            </div>

            <div class="contact-item">
                <div class="contact-icon">📱</div>
                <div class="contact-details">
                    <h3>Phone</h3>
                    <p>{{contactInfo.phone}}</p>
                </div>
            </div>

            <div class="contact-item">
                <div class="contact-icon">🌐</div>
                <div class="contact-details">
                    <h3>Social Links</h3>
                    <div class="social-links">
                        <a ng-repeat="link in contactInfo.links" href="{{link.url}}" target="_blank" class="social-link">
                            {{link.icon}}
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Contact Form -->
    <div class="contact-card">
        <h2>Send Message</h2>
        <form ng-submit="send()" class="contact-form">
            <div class="form-group">
                <input type="text" ng-model="formData.name" placeholder="Your Name" required class="form-input">
            </div>

            <div class="form-group">
                <input type="email" ng-model="formData.email" placeholder="Your Email" required class="form-input">
            </div>

            <div class="form-group">
                <textarea ng-model="formData.message" placeholder="Your Message" required class="form-textarea"></textarea>
            </div>

            <button type="submit" class="btn-primary">Send Message</button>
        </form>
    </div>
</div>

</div>
